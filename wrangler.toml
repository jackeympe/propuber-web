name = "propuber-web"
compatibility_date = "2026-06-30"
pages_build_output_dir = "dist"

[vars]
APP_ENV = "production"
# LIVE backend on Render (Python FastAPI). functions/api/[[path]].js proxies /api/* here.
PROPUBER_BACKEND_URL = "https://propuber-backend.onrender.com"

# ── R2 bucket binding (task B) ──────────────────────────────
# Uncomment AFTER `wrangler r2 bucket create propuber-assets` succeeds
# (requires R2 enabled in the Cloudflare dashboard — account currently returns code 10042).
# [r2_buckets]
# binding = "R2"
# bucket_name = "propuber-assets"
# preview_bucket_name = "propuber-assets"
