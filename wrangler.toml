name = "propuber-web"
compatibility_date = "2026-06-30"
pages_build_output_dir = "dist"

[vars]
APP_ENV = "production"
PAYFAST_MODE = "live"
PAYFAST_MERCHANT_ID = "34149035"
# PAYFAST_MERCHANT_KEY and PAYFAST_PASSPHRASE are set as ENCRYPTED secrets
# via: wrangler pages secret put PAYFAST_MERCHANT_KEY --project-name propuber-web
# (never commit them here). Cash rails run 100% on CF Pages Functions + KV — no Render.

# Cloudflare KV: settlement ledger + invoice book (replaces Render disk storage)
[[kv_namespaces]]
binding = "CASH"
id = "036b7efa75544cc0809364407490360e"
